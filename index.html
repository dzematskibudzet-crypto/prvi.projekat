<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Moj Projekat 2026</title>
<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    overflow: hidden;
}

button {
    padding: 20px 40px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    background: lime;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

#loading {
    display: none;
    font-size: 28px;
    margin-top: 20px;
}

#prankScreen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
}

#prankScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<h1>🚀 Klikni da vidiš moj projekat</h1>
<button id="trollBtn">POGLEDAJ PROJEKAT</button>

<div id="loading">Učitavanje projekta... 0%</div>

<div id="prankScreen">
    <img id="prankImage" src="">
    <audio id="prankSound" src=""></audio>
</div>

<script>
// Ovde stavi svoje fajlove
const imageFile = "slika.jpg"; // ime slike
const audioFile = "zvuk.mp3";  // ime zvuka

// Referencije
const btn = document.getElementById("trollBtn");
const loading = document.getElementById("loading");
const prankScreen = document.getElementById("prankScreen");
const prankImage = document.getElementById("prankImage");
const prankSound = document.getElementById("prankSound");

// Dugme
btn.addEventListener("click", function() {
    btn.style.display = "none";
    loading.style.display = "block";

    let percent = 0;
    const interval = setInterval(() => {
        percent += 5;
        loading.innerText = "Učitavanje projekta... " + percent + "%";
        if (percent >= 100) {
            clearInterval(interval);
            startPrank();
        }
    }, 100);
});

// Funkcija za prank
function startPrank() {
    document.body.innerHTML = "";
    prankScreen.style.display = "block";
    prankImage.src = imageFile;
    prankSound.src = audioFile;

    // Auto play zvuk
    prankSound.play().catch(() => {
        // Ako browser blokira autoplay
        alert("Klikni da pustiš zvuk!");
        prankSound.play();
    });
}
</script>

</body>
</html>
